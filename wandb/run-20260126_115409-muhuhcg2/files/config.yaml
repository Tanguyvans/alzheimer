data:
    value:
        classes:
            AD: 1
            CN: 0
        slice_extraction:
            n_slices: 3
            output_size: 448
            region_end: 0.6
            region_start: 0.4
            view: coronal
        test_csv: ../data/combined/mri_cn_ad_test.csv
        train_csv: ../data/combined/mri_cn_ad_train.csv
        val_csv: ../data/combined/mri_cn_ad_val.csv
experiment:
    value:
        description: MedGemma 1.5 4B fine-tuning for Alzheimer's classification using coronal hippocampus slices
        name: medgemma_alzheimer_cn_ad
        task: cn_ad_binary
hardware:
    value:
        device_map: auto
        torch_dtype: bfloat16
inference:
    value:
        do_sample: false
        max_new_tokens: 10
        prompt: 'These are 3 coronal MRI slices of the hippocampus region. Based on hippocampal morphology, classify this patient as either cognitively normal (CN) or having Alzheimer''s disease (AD). Respond with only: CN or AD'
        temperature: 1
model:
    value:
        lora:
            lora_alpha: 16
            lora_dropout: 0.05
            r: 16
            target_modules: all-linear
            task_type: CAUSAL_LM
        name: google/medgemma-1.5-4b-it
        quantization:
            bnb_4bit_compute_dtype: bfloat16
            bnb_4bit_quant_type: nf4
            bnb_4bit_use_double_quant: true
            load_in_4bit: true
training:
    value:
        bf16: true
        effective_batch_size: 16
        eval_steps: 100
        eval_strategy: epoch
        fp16: false
        gradient_accumulation_steps: 16
        gradient_checkpointing: true
        greater_is_better: true
        learning_rate: 2e-05
        load_best_model_at_end: true
        logging_steps: 10
        lr_scheduler_type: cosine
        max_grad_norm: 1
        metric_for_best_model: eval_balanced_accuracy
        num_epochs: 3
        output_dir: ./checkpoints
        per_device_eval_batch_size: 1
        per_device_train_batch_size: 1
        save_strategy: epoch
        save_total_limit: 3
        seed: 42
        warmup_ratio: 0.1
        weight_decay: 0.01
wandb:
    value:
        enabled: true
        name: medgemma_cn_ad_qlora
        project: medgemma-alzheimer
        tags:
            - medgemma
            - alzheimer
            - cn-vs-ad
            - qlora
