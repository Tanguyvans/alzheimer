# CNN 3D: MRI-only classification
# Baseline 3D CNN for Alzheimer's Disease classification

experiment:
  name: "cnn3d_classification"
  task: "cn_ad_trajectory"
  dataset: "multi_cohort_v2"
  description: "3D CNN baseline for MRI-based AD classification"

model:
  architecture: "cnn3d_base"  # cnn3d_small, cnn3d_base, cnn3d_large
  num_classes: 2
  in_channels: 1
  image_size: 128
  dropout: 0.1
  classifier_dropout: 0.5

data:
  train_csv: "../multimodal_fusion/data/combined_trajectory/train.csv"
  val_csv: "../multimodal_fusion/data/combined_trajectory/val.csv"
  test_csv: "../multimodal_fusion/data/combined_trajectory/test.csv"
  checkpoints_dir: "checkpoints"
  results_dir: "results"

preprocessing:
  use_paper_preprocessing: true
  target_spacing: 1.75

training:
  epochs: 100
  batch_size: 4
  learning_rate: 0.0001
  weight_decay: 0.01
  lr_min: 0.000001
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 5
  gradient_clip: 1.0
  use_weighted_loss: true
  label_smoothing: 0.1
  seed: 42

  # Loss function: "cross_entropy" or "focal"
  loss_type: "cross_entropy"
  focal_alpha: 0.75
  focal_gamma: 2.0

  # Test-time augmentation
  use_tta: true
  tta_augmentations: 8

hardware:
  device: "cuda"
  num_workers: 4
  pin_memory: true

callbacks:
  early_stopping:
    enabled: true
    patience: 20
    min_epochs: 40
    monitor: "val_accuracy"
  checkpoint:
    save_best: true

wandb:
  enabled: true
  project: "alzheimer-cnn3d"
  name: "cnn3d_base"
